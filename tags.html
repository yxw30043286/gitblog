<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标签 · 加载中…</title>
  <link rel="alternate" type="application/rss+xml" title="RSS" href="rss.xml">
  <link rel="stylesheet" href="assets/css/common.css?v=20260512">
  <link rel="stylesheet" href="assets/css/home.css?v=20260512">
  <script>(function(){var t=localStorage.getItem('blog_theme')||'auto';var d=t==='auto'?window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light':t;document.documentElement.setAttribute('data-theme',d);document.documentElement.dataset.themeChoice=t;})();</script>
  <style>
    .tag-page { max-width: var(--content-max); margin: 28px auto; padding: 0 24px; }
    .tag-page h1 { font-size: 24px; margin-bottom: 8px; font-weight: 700; }
    .tag-page .desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }
    .tag-cloud-big {
      display: flex; flex-wrap: wrap; gap: 10px;
      padding: 24px;
      background: var(--bg-soft);
      border-radius: var(--radius-lg);
      margin-bottom: 28px;
    }
    .tag-cloud-big .tag {
      font-size: 14px;
      padding: 5px 14px;
      cursor: pointer;
    }
    .tag-cloud-big .tag .count {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-left: 4px;
    }
    .tag-cloud-big .tag.active .count { color: rgba(255,255,255,0.8); }
    .group-block { margin-bottom: 32px; }
    .group-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .group-title .count { color: var(--text-tertiary); font-weight: 400; margin-left: 8px; font-size: 13px; }
  </style>
</head>
<body>
  <div id="site-nav"></div>

  <main class="tag-page">
    <h1>标签</h1>
    <p class="desc" id="tagDesc">点击标签筛选文章</p>
    <div class="tag-cloud-big" id="tagCloud"></div>
    <ul class="post-list" id="postList"></ul>
    <div id="groupList"></div>
  </main>

  <div id="site-footer"></div>
  <div id="site-overlays"></div>

  <script type="module" src="assets/js/tags.js?v=20260512"></script>
</body>
</html>
