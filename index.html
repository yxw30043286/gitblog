<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加载中…</title>
  <meta name="description" content="">
  <link rel="alternate" type="application/rss+xml" title="RSS" href="rss.xml">
  <link rel="stylesheet" href="assets/css/common.css?v=20260512">
  <link rel="stylesheet" href="assets/css/home.css?v=20260512">
  <script>(function(){var t=localStorage.getItem('blog_theme')||'auto';var d=t==='auto'?window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light':t;document.documentElement.setAttribute('data-theme',d);document.documentElement.dataset.themeChoice=t;})();</script>
</head>
<body>
  <div id="site-nav"></div>

  <section class="hero" id="hero" hidden></section>

  <main class="layout">
    <section>
      <div class="tabs">
        <div class="tab active" data-tab="latest">最新</div>
        <div class="tab" data-tab="hot">热门</div>
        <div class="tab" data-tab="all">全部</div>
      </div>
      <ul id="postList" class="post-list">
        <li class="loading">加载中…</li>
      </ul>
    </section>
    <aside class="sidebar">
      <div class="sidebar-card">
        <h3>关于站长</h3>
        <div class="sidebar-author">
          <div class="avatar" id="sidebarAvatar"></div>
          <div>
            <div class="name" id="sidebarName"></div>
            <div class="desc" id="sidebarDesc"></div>
          </div>
        </div>
      </div>
      <div class="sidebar-card">
        <h3>热门标签</h3>
        <div class="tag-cloud" id="tagCloud"></div>
      </div>
      <div class="sidebar-card">
        <h3>最近更新</h3>
        <ul class="recent-list" id="recentList"></ul>
      </div>
    </aside>
  </main>

  <div id="site-footer"></div>

  <script type="module" src="assets/js/home.js?v=20260512"></script>
