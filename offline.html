<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 · 没有网络</title>
  <link rel="stylesheet" href="assets/css/common.css?v=20260512132200">
  <style>
    .offline-wrap {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      flex-direction: column;
      text-align: center;
      gap: 14px;
    }
    .offline-wrap h1 { font-size: 22px; font-weight: 700; }
    .offline-wrap p { color: var(--text-secondary); font-size: 14px; line-height: 1.7; max-width: 460px; }
    .offline-wrap .icon {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }
    .offline-wrap .btn {
      margin-top: 6px;
      padding: 8px 20px;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#ea6f5a">
  <link rel="apple-touch-icon" href="assets/icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
  <div id="site-nav"></div>
  <div class="offline-wrap">
    <div class="icon">
      <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 015.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0122.58 9"/>
        <path d="M1.42 9a15.91 15.91 0 014.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 016.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>当前没有网络</h1>
    <p>你正在离线浏览。已访问过的文章 / 列表会从本地缓存加载，但未访问过的页面、评论、最新数据需要联网。</p>
    <button class="btn" onclick="location.reload()">重试</button>
    <a href="./" style="font-size:13px;color:var(--text-tertiary);">回到首页 →</a>
  </div>
  <div id="site-footer"></div>
</body>
</html>
